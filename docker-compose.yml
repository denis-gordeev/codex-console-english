version: '3.8'

services:
  webui:
    build: .
    ports:
      - "1455:1455"
    environment:
      - WEBUI_HOST=0.0.0.0
      - WEBUI_PORT=1455
      - DEBUG=0
      - LOG_LEVEL=info
      # If you need an access password, you can uncomment and set it here
      - WEBUI_ACCESS_PASSWORD=admin123
    volumes:
      # Mount the data directory to persist the database and logs
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped