<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Upgrade - OpenAI Registration System</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💳</text></svg>">
    <style>
        .plan-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        .plan-card {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
            text-align: center;
        }
        .plan-card:hover {
            border-color: var(--primary-color);
        }
        .plan-card.selected {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        .plan-card h3 { margin: 0 0 8px; font-size: 1.2rem; }
        .plan-card p  { margin: 0; color: var(--text-secondary); font-size: 0.9rem; }
        .team-options { display: none; }
        .team-options.show { display: block; }
        .link-box {
            display: none;
            margin-top: 16px;
        }
        .link-box.show { display: block; }
        .link-text {
            width: 100%;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            resize: vertical;
            min-height: 80px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Navigation bar -->
        <nav class="navbar">
            <div class="nav-brand">
                <h1>OpenAI Registration System</h1>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link">Register</a>
                <a href="/accounts" class="nav-link">Account Management</a>
                <a href="/email-services" class="nav-link">Email Services</a>
                <a href="/payment" class="nav-link active">Payment</a>
                <a href="/settings" class="nav-link">Settings</a>
                <a href="/logout" class="nav-link">Logout</a>
            </div>
            <button class="theme-toggle" onclick="theme.toggle()" title="Switch theme">🌙</button>
        </nav>

        <!-- Main content area -->
        <main class="main-content">
            <div class="page-header">
                <h2>Payment upgrade</h2>
                <p class="subtitle">Generate Plus or Team subscription payment link for account</p>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Select a package</h3>
                </div>
                <div class="card-body">
                    <!-- Package selection -->
                    <div class="plan-cards">
                        <div class="plan-card selected" id="plan-plus" onclick="selectPlan('plus')">
                            <h3>Plus</h3>
                            <p>Individual subscription, $20/month</p>
                        </div>
                        <div class="plan-card" id="plan-team" onclick="selectPlan('team')">
                            <h3>Team</h3>
                            <p>Team subscription, charged per seat</p>
                        </div>
                    </div>

                    <!-- Account selection -->
                    <div class="form-group">
                        <label for="account-select">Select account</label>
                        <select id="account-select" style="width:100%">
                            <option value="">-- Loading... --</option>
                        </select>
                    </div>

                    <!-- Country selection -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="country-select">Billing country</label>
                            <select id="country-select" onchange="onCountryChange()">
                                <option value="SG">Singapore (SGD)</option>
                                <option value="US">United States (USD)</option>
                                <option value="TR">Turkey (TRY)</option>
                                <option value="JP">Japan (JPY)</option>
                                <option value="HK">Hong Kong (HKD)</option>
                                <option value="GB">United Kingdom (GBP)</option>
                                <option value="AU">Australia (AUD)</option>
                                <option value="CA">Canada (CAD)</option>
                                <option value="IN">India (INR)</option>
                                <option value="BR">Brazil (BRL)</option>
                                <option value="MX">Mexico (MXN)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Corresponding currency</label>
                            <input type="text" id="currency-display" value="SGD" readonly style="background:var(--surface-hover);cursor:default">
                        </div>
                    </div>

                    <!-- Team additional parameters -->
                    <div class="team-options" id="team-options">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="workspace-name">workspace name</label>
                                <input type="text" id="workspace-name" value="MyTeam" placeholder="MyTeam">
                            </div>
                            <div class="form-group">
                                <label for="seat-quantity">Seat quantity</label>
                                <input type="number" id="seat-quantity" value="5" min="1" max="100">
                            </div>
                            <div class="form-group">
                                <label for="price-interval">Billing cycle</label>
                                <select id="price-interval">
                                    <option value="month">Monthly payment</option>
                                    <option value="year">Annual payment</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Operation area -->
                    <div class="form-actions">
                        <button class="btn btn-primary" onclick="generateLink()">Generate payment link</button>
                    </div>

                    <!-- Link results -->
                    <div class="link-box" id="link-box">
                        <label>Payment link</label>
                        <textarea class="link-text" id="link-text" readonly></textarea>
                        <div class="form-actions" style="margin-top:10px">
                            <button class="btn btn-secondary" onclick="copyLink()">Copy link</button>
                            <button class="btn btn-primary" onclick="openIncognito()">Open the browser incognito</button>
                        </div>
                        <p class="hint" id="open-status"></p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/utils.js?v={{ static_version }}"></script>
    <script src="/static/js/payment.js?v={{ static_version }}"></script>
</body>
</html>
